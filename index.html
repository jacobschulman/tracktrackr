<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackTrackr — Ultra Music Festival Dashboard</title>
  <meta name="description" content="25+ years of Ultra Music Festival DJ sets, tracklists, and hidden patterns — visualized.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
  <!-- Sidebar nav -->
  <nav id="sidebar">
    <a href="#/" class="logo">
      <span class="logo-icon">▦</span>
      <span class="logo-text">TrackTrackr</span>
    </a>

    <div class="nav-links">
      <a href="#/" class="nav-link" data-view="overview">
        <span class="nav-icon">◆</span> Home
      </a>
      <a href="#/djs" class="nav-link" data-view="djs">
        <span class="nav-icon">◎</span> DJs
      </a>
      <a href="#/tracks" class="nav-link" data-view="tracks">
        <span class="nav-icon">♫</span> Tracks
      </a>
      <a href="#/year" class="nav-link" data-view="year">
        <span class="nav-icon">◷</span> Sets
      </a>
      <a href="#/stages" class="nav-link" data-view="stages">
        <span class="nav-icon">⬡</span> Stages
      </a>

      <div class="nav-divider"></div>

      <a href="#/versus" class="nav-link" data-view="versus">
        <span class="nav-icon">⚔</span> Versus
      </a>
      <a href="#/journeys" class="nav-link" data-view="journeys">
        <span class="nav-icon">↝</span> Journeys
      </a>
      <a href="#/dna" class="nav-link" data-view="dna">
        <span class="nav-icon">◉</span> DNA
      </a>
    </div>

    <div class="sidebar-footer">
      <div class="data-credit">
        Data from <a href="https://www.1001tracklists.com" target="_blank" rel="noopener">1001Tracklists</a>
      </div>
    </div>
  </nav>

  <!-- Mobile bottom tab bar -->
  <nav id="mobile-tabs">
    <a href="#/" class="tab-link" data-view="overview">◆<span>Home</span></a>
    <a href="#/djs" class="tab-link" data-view="djs">◎<span>DJs</span></a>
    <a href="#/tracks" class="tab-link" data-view="tracks">♫<span>Tracks</span></a>
    <a href="#/year" class="tab-link" data-view="year">◷<span>Sets</span></a>
    <a href="#/stages" class="tab-link" data-view="stages">⬡<span>Stages</span></a>
  </nav>

  <!-- Main content -->
  <main id="content">
    <header id="header">
      <a href="#/" class="header-brand">
        <span class="header-brand-icon">▦</span>
        <span class="header-brand-text">TrackTrackr</span>
      </a>
      <div id="breadcrumbs"></div>
      <div id="search-container">
        <button id="search-toggle" class="search-toggle" aria-label="Search"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
        <input type="text" id="global-search" placeholder="Search DJs & tracks..." autocomplete="off">
        <div id="search-results" class="search-dropdown hidden"></div>
      </div>
    </header>
    <div id="view-container"></div>
  </main>

  <!-- CDN dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <script type="module" src="js/app.js?v=5"></script>
</body>
</html>
